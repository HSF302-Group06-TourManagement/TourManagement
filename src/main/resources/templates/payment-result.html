<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment Result</title>
    <link rel="stylesheet" th:href="@{/bootstrap.css}">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="custom-panel mt-4">
        <h2 class="sub-title">Payment Result</h2>

        <div class="alert alert-success" th:if="${result.success}">
            <strong th:text="${result.message}"></strong>
        </div>

        <div class="alert alert-danger" th:if="${!result.success}">
            <strong th:text="${result.message}"></strong>
        </div>

        <dl class="row">
            <dt class="col-sm-3">Transaction Ref</dt>
            <dd class="col-sm-9" th:text="${result.transactionRef}"></dd>

            <dt class="col-sm-3">Response Code</dt>
            <dd class="col-sm-9" th:text="${result.responseCode}"></dd>

            <dt class="col-sm-3">Amount</dt>
            <dd class="col-sm-9" th:text="${result.amount}"></dd>

            <dt class="col-sm-3">Valid Signature</dt>
            <dd class="col-sm-9" th:text="${result.validSignature ? 'Yes' : 'No'}"></dd>
        </dl>

        <a class="btn btn-primary" th:href="@{/tours}">Back to List</a>
    </div>
</div>
<script th:src="@{/bootstrap.bundle.js}"></script>
</body>
</html>
